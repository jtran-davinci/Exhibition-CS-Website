<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- link the CSS file -->
    <link rel="stylesheet" href="style.css" />
    <title>Genres</title>
  </head>
  <body>
    <!-- children of the body element -->
    <a class="floating-btn top-btn" id="return" href="/">Return Home</a>
    <a class="floating-btn bottom-btn" href="../creation/">How was this site made?</a>

    <div class="row grey">
      <div class="box pink center-content">
        <a href="../genre/?genre=pop">
            <img
            src="../images/POP.png"
            class="returnclick"
            onclick="playSound()"
            />
        </a>
      </div>
      <div class="box blue center-content">
        <a href="../genre/?genre=rnb">
            <img
            src="../images/R&B.png"
            class="returnclick"
            onclick="playSound()"
            />
        </a>
      </div>
    </div>
    <div class="row dark-grey">
      <div class="box green center-content">
        <a href="../genre/?genre=rock">
            <img
            src="../images/ROCK.png"
            class="returnclick"
            onclick="playSound()"
            />
        </a>
      </div>
      <div class="box yellow center-content">
        <a href="../genre/?genre=jazz">
        <img
          src="../images/JAZZ.png"
          class="returnclick"
          onclick="playSound()"
        />
        </a>
      </div>
    </div>
    <audio src="../audio/click.wav" id="click"></audio>
    <script src="genre-page.js"></script>
    <script src="../scripts/timeout.js" defer></script>
  </body>
</html>
