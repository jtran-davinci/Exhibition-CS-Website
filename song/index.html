<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Song Page</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-ruby.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <a class="floating-btn top-btn" id="return">Go Back</a>
    <a class="floating-btn bottom-btn" href="../creation/">How was this site made?</a>

    <div class="overlay-container">
        <div class="overlay" id="songCard">
            <div class="main-content">
                <div class="song-card">
                  <div class="song-image-container">
                    <img class="song-image" id="cover"/>
                  </div>
                  <div class="song-detail">
                    <div class="song-upper">
                      <h1 id="songName"></h1>
                      <h2 id="artists"></h2>
                    </div>

                    <div class="song-lower">
                      <h2>Recreated in Sonic Pi by</h2>
                      <h1 id="creator"></h1>
                    </div>
                  </div>
                </div>
            </div>

            <div class="main-content">
                <div class="song-player">

                  <audio id="audio"></audio>

                  <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="progress-knob" id="progressKnob"></div>
                  </div>

                  <div class="time-row">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                  </div>

                  <div class="controls">
                    <button id="rewind" class="control-btn">
                      
                      <svg viewBox="0 0 24 24" width="28">
                        <polygon points="11 19 2 12 11 5 11 19"></polygon>
                        <polygon points="22 19 13 12 22 5 22 19"></polygon>
                      </svg>

                    </button>

                    <button id="playPause" class="control-btn">

                      <svg id="playIcon" viewBox="0 0 24 24" class="icon active">
                        <polygon points="5 3 19 12 5 21"></polygon>
                      </svg>

                      <svg id="pauseIcon" viewBox="0 0 24 24" class="icon">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                      </svg>

                    </button>

                    <button id="forward" class="control-btn">

                      <svg viewBox="0 0 24 24" width="28">
                        <polygon points="13 5 22 12 13 19 13 5"></polygon>
                        <polygon points="2 5 11 12 2 19 2 5"></polygon>
                      </svg>

                    </button>
                  </div>
                </div>
            </div>

            <button id="showCode" class="show-code-btn">
              Show Code
            </button>
        </div>

        <div class="overlay-code" id="codeOverlay">
          <div class="main-content">
            <pre><code id="codeBlock" class="language-ruby"></code></pre>
          </div>
        </div>
    </div>
    
    <script src="loader.js" defer></script>
    <script src="audio-player.js" defer></script>
    <script src="code-toggle.js" defer></script>
    <script src="../scripts/timeout.js" defer></script>
  </body>
</html>
